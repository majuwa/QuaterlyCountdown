name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Check formatting (Spotless)
        run: ./gradlew spotlessCheck

      - name: Static analysis (Detekt)
        run: ./gradlew detekt

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Run unit tests with coverage
        run: ./gradlew testDebugUnitTest koverXmlReportDebug koverHtmlReportDebug

      - name: Report coverage summary
        run: |
          XML=app/build/reports/kover/reportDebug.xml
          MISSED=$(python3 -c "
          import xml.etree.ElementTree as ET
          root = ET.parse('$XML').getroot()
          for c in root.iter('counter'):
              if c.get('type') == 'LINE':
                  missed, covered = int(c.get('missed')), int(c.get('covered'))
                  total = missed + covered
                  pct = covered * 100 // total if total else 0
                  print(f'{pct}% ({covered}/{total} lines)')
                  break
          ")
          echo "### Coverage: $MISSED" >> $GITHUB_STEP_SUMMARY

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: app/build/reports/kover/htmlDebug/

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: app/build/reports/tests/testDebugUnitTest/
